# Hooks locales vía uv: garantizan las mismas versiones que el proyecto (uv.lock)
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types_or: [python, pyi]
        pass_filenames: false
